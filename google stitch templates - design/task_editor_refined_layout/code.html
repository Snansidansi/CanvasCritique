<!DOCTYPE html>

<html class="light" lang="en" style=""><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ScribeFlow - Create Task</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e0e3e5",
                        "error": "#ba1a1a",
                        "tertiary-container": "#656d81",
                        "tertiary-fixed-dim": "#bfc6dd",
                        "on-secondary-fixed-variant": "#2b3e99",
                        "on-tertiary-container": "#edf0ff",
                        "surface-dim": "#d8dadc",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#434656",
                        "on-secondary-container": "#1a2f8b",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#0035be",
                        "on-surface": "#191c1e",
                        "surface-tint": "#124af0",
                        "on-primary-fixed": "#001356",
                        "secondary": "#4457b3",
                        "on-tertiary-fixed": "#141b2c",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-fixed": "#dee1ff",
                        "inverse-primary": "#b8c3ff",
                        "primary-fixed-dim": "#b8c3ff",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-low": "#f2f4f6",
                        "inverse-surface": "#2d3133",
                        "surface-bright": "#f7f9fb",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e6e8ea",
                        "primary": "#0040e0",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#bac3ff",
                        "primary-container": "#2e5bff",
                        "on-background": "#191c1e",
                        "surface-container": "#eceef0",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#dbe2fa",
                        "on-primary-container": "#efefff",
                        "outline-variant": "#c4c5d9",
                        "tertiary": "#4d5568",
                        "primary-fixed": "#dde1ff",
                        "outline": "#747688",
                        "on-primary": "#ffffff",
                        "background": "#f7f9fb",
                        "surface": "#f7f9fb",
                        "on-secondary-fixed": "#001159",
                        "on-tertiary-fixed-variant": "#3f4759",
                        "secondary-container": "#8b9dfe",
                        "on-secondary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "48px",
                        "sidebar-width": "280px",
                        "gutter": "24px",
                        "container-padding": "40px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for textareas */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: #c4c5d9;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen relative">
<header class="w-full top-0 sticky bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-on-surface-variant flex items-center justify-between px-gutter h-16 z-50">
<button class="material-symbols-outlined text-primary dark:text-primary-fixed hover:bg-surface-container-high transition-colors active:opacity-70 p-2 rounded-full -ml-2">arrow_back</button>
<span class="font-headline-md text-headline-md text-primary tracking-tight">ScribeFlow</span>
</header>
<main class="max-w-3xl mx-auto px-4 md:px-container-padding py-8 md:py-12 flex flex-col gap-8 md:gap-section-gap">
<header class="flex flex-col gap-2">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">Create Task</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Define the parameters and provide reference materials for this assignment.</p>
</header>
<form class="flex flex-col gap-8">
<div class="flex flex-col gap-2 group">
<label class="font-label-md text-label-md text-on-surface group-focus-within:text-primary transition-colors" for="taskName">Task Name</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant px-0 py-3 font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:ring-0 focus:border-primary focus:border-b-2 transition-all" id="taskName" placeholder="e.g., Q3 Financial Analysis Review" type="text"/>
</div>
</div>
<div class="flex flex-col gap-3">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface" for="instructions">Instructions</label>
<div class="flex items-center gap-4">
</div>
</div>
<div class="relative">
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary resize-y shadow-sm" id="instructions" placeholder="Write detailed step-by-step instructions. Markdown is supported." rows="5"></textarea>
</div>
</div><div class="flex flex-col gap-3">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface">Instruction Material</label>
</div>
<div class="w-full border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-low p-8 flex flex-col items-center justify-center gap-4 cursor-pointer hover:bg-surface-container hover:border-primary/50 transition-all group relative overflow-hidden">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-14 h-14 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center group-hover:scale-110 transition-transform duration-300 shadow-sm z-10">
<span class="material-symbols-outlined text-[28px]" style='font-variation-settings: "FILL" 1;'>upload_file</span>
</div>
<div class="text-center z-10">
<p class="font-label-md text-label-md text-on-surface">Tap to upload or drag and drop</p>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Supports PDF, PNG, JPG (Max 25MB)</p>
</div>
</div>
</div>
<div class="flex flex-col gap-3">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface" for="solution">Solution</label>
</div>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary resize-y shadow-sm" id="solution" placeholder="Provide the expected outcome or evaluation criteria..." rows="4"></textarea>
</div>
<div class="flex flex-col gap-3">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface">Solution Material</label>
</div>
<div class="w-full border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-low p-8 flex flex-col items-center justify-center gap-4 cursor-pointer hover:bg-surface-container hover:border-primary/50 transition-all group relative overflow-hidden">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-14 h-14 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center group-hover:scale-110 transition-transform duration-300 shadow-sm z-10">
<span class="material-symbols-outlined text-[28px]" style='font-variation-settings: "FILL" 1;'>upload_file</span>
</div>
<div class="text-center z-10">
<p class="font-label-md text-label-md text-on-surface">Tap to upload or drag and drop</p>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Supports PDF, PNG, JPG (Max 25MB)</p>
</div>
</div>
</div>
<div class="flex justify-end mt-4"><button class="w-full md:w-auto bg-primary text-on-primary font-label-md text-label-md px-8 py-3.5 rounded-full hover:bg-primary/90 active:scale-95 transition-all shadow-[0_4px_14px_rgba(0,64,224,0.25)] flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[20px]">save</span>Save Task</button></div></form>
</main>
</body></html>
